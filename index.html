    // Clear any stale PWA/browser cache on load
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(name) { caches.delete(name); });
      });
    }
    window.onerror = function(msg, src, line, col, err) {
      var errLine = line;
      var errCol = col;
      var errMsg = msg;
      function show(ctx) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;inset:0;background:#0a0a0a;z-index:99999;overflow:auto;padding:24px;font-family:monospace;font-size:12px;color:#fff';
        d.innerHTML =
          '<div style="color:#FF6B35;font-weight:900;font-size:16px;margin-bottom:12px">' + window.__v + ' -- SyntaxError</div>' +
          '<div style="margin-bottom:8px"><b style="color:#888">MSG:</b> ' + errMsg + '</div>' +
          '<div style="margin-bottom:16px"><b style="color:#888">LINE:</b> <span style="color:#FF6B35">' + errLine + '</span>  <b style="color:#888">COL:</b> <span style="color:#FF6B35">' + errCol + '</span></div>' +
          '<div style="color:#888;margin-bottom:8px">RAW BYTES around line ' + errLine + ':</div>' +
          '<div id="ctx" style="background:#111;padding:12px;border-radius:8px;white-space:pre;overflow-x:auto;font-size:11px;line-height:1.8">' + (ctx || 'fetching...') + '</div>' +
          '<button onclick="localStorage.clear();location.reload()" style="margin-top:16px;padding:14px;background:#FF6B35;border:none;color:#000;border-radius:10px;cursor:pointer;font-size:14px;font-weight:800;width:100%">Clear cache & reload</button>';
        (document.body || document.documentElement).appendChild(d);
      }
      // Fetch the actual live file and show raw chars around error line
      fetch(location.href + '?nocache=' + Date.now(), {cache: 'no-store'})
        .then(function(r){ return r.text(); })
        .then(function(html){
          var lines = html.split('\n');
          var start = Math.max(0, errLine - 4);
          var end = Math.min(lines.length, errLine + 3);
          var out = '';
          // Show line 1 (version) first
          out += '<b style="color:#52E3A0">LINE 1 (version check):</b>\n';
          out += lines[0].replace(/&/g,'&amp;').replace(/</g,'&lt;') + '\n\n';
          out += '<b style="color:#52E3A0">AROUND LINE ' + errLine + ':</b>\n';
          for (var i = start; i < end; i++) {
            var ln = lines[i];
            var lineNum = (i+1);
            var isErr = (lineNum === errLine);
            var safe = '';
            for (var j = 0; j < Math.min(ln.length, 120); j++) {
              var code = ln.charCodeAt(j);
              if (code > 127) {
                safe += '[U+' + code.toString(16).toUpperCase() + ']';
              } else {
                safe += ln[j].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
              }
            }
            out += (isErr ? '<span style="background:#FF6B3533;display:block">' : '') +
                   '<span style="color:#555">' + lineNum + ':</span> ' + safe +
                   (isErr ? '</span>' : '') + '\n';
          }
          // Also show total line count
          out += '\n<b style="color:#52E3A0">TOTAL LINES: ' + lines.length + '</b>';
          show(out);
        })
        .catch(function(e){ show('fetch failed: ' + e); });
      return true;
    };
