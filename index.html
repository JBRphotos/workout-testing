const getC = (TH) => {
    // Detect light theme by background luminance
    const isLight = TH.bg && (TH.bg.startsWith("#F") || TH.bg.startsWith("#f") || TH.bg === "#FFFFFF" || TH.bg === "#ffffff");
    return {
        card: TH.card || TH.surface,
        cardBorder: TH.cardBorder || TH.border,
        surface: TH.surface,
        border: TH.border,
        text: TH.text,
        muted: TH.muted,
        sub: TH.sub,
        accent: TH.accent,
        input: isLight ? "#FFFFFF" : "#141414",
        inputBorder: isLight ? "#CCCCCC" : "#222222",
        inputText: TH.text,
        btnBg: isLight ? "#EFEFEF" : "#1a1a1a",
        btnBorder: isLight ? "#CCCCCC" : "#2a2a2a",
        btnText: isLight ? "#333333" : "#666666",
        deep: isLight ? "#EBEBEB" : "#0d0d0d",
        deepBorder: isLight ? "#D0D0D0" : "#1a1a1a",
    };
};

let _C = null;

const getRankInfo = (totalXP, themeId) => {
    const theme = APP_THEMES[themeId] || APP_THEMES.solo;
    const allRanks = [...(theme.ranks || []), ...(theme.prestige || [])];
    const ranks = allRanks.map((r, i) => (Object.assign(Object.assign({}, r), { xpNeeded: XP_THRESHOLDS[i] || XP_THRESHOLDS[XP_THRESHOLDS.length - 1] })));
    let idx = 0;
    for (let i = ranks.length - 1; i >= 0; i--) {
        if (totalXP >= ranks[i].xpNeeded) {
            idx = i;
            break;
        }
    }
    const current = ranks[idx];
    const next = ranks[Math.min(idx + 1, ranks.length - 1)];
    const xpInto = totalXP - current.xpNeeded;
    const xpSpan = next.xpNeeded - current.xpNeeded || 1;
    const progress = idx >= ranks.length - 1 ? 1 : xpInto / xpSpan;
    return { current, next, xpInto, xpSpan, progress };
};
const getWeekKey = () => {
    const d = new Date();
    const day = d.getDay();
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((day + 6) % 7));
    return `${mon.getFullYear()}-${mon.getMonth()}-${mon.getDate()}`;
